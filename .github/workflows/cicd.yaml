name: ZenithRAG CI/CD

on:
  push:
    branches: [ main ]
    paths-ignore: [ 'README.md' ]

permissions:
  id-token: write
  contents: read

env:
  # Opt-in to Node 24 for 2026 Runner Standards
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: eu-north-1
  # HARDCODED URI: This prevents the "invalid reference format" error
  ECR_IMAGE_URI: 577435557871.dkr.ecr.eu-north-1.amazonaws.com/zenithrag:latest

jobs:
  integration:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Environment Check
        run: echo "Validating ZenithRAG Environment..."

  build-and-push-ecr-image:
    name: Continuous Delivery
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'

      - name: Build and Push Image
        run: |
          docker build -t ${{ env.ECR_IMAGE_URI }} .
          docker push ${{ env.ECR_IMAGE_URI }}
          
  Continuous-Deployment:
    name: Continuous Deployment
    needs: build-and-push-ecr-image
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Pull and Restart Container
        run: |
         # 1. Pull using the explicit URI
         docker pull ${{ env.ECR_IMAGE_URI }}
         
         # 2. Clean up old container
         docker stop zenithrag || true 
         docker rm zenithrag || true
         
         # 3. Deploy with Groq and AWS context
         docker run -d -p 8080:8080 --name=zenithrag \
         -e 'AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}' \
         -e 'AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}' \
         -e 'AWS_REGION=${{ env.AWS_REGION }}' \
         -e 'GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}' \
         ${{ env.ECR_IMAGE_URI }}

      - name: System Cleanup
        run: docker system prune -f